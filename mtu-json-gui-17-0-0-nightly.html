        /**
        * 归位功能：实现“斜”（智能探测）与“直”（强制转正）
        * @param {string} mode - 'slanted' (智能角度) 或 'straight' (强制 0 度)
        */
        function recalibrateMode(mode) {
            if (activeRegionIndex === -1 || !regions[activeRegionIndex]) return;
            const r = regions[activeRegionIndex];

            if (mode === 'slanted') {
                // --- “斜”：重新计算最契合的倾斜角度 ---
                // 1. 将角度设为 null，触发 initRegionBox 内部的角度判定逻辑
                r.angle = null; 
                initRegionBox(r); // initRegionBox 会根据 lines 向量重新推算 angle 并重新计算 box
            } else {
                // --- “直”：强制转正为 0 度 ---
                // 1. 将角度强制设为 0
                r.angle = 0; 
                // 2. 在 0 度姿态下重新计算包围盒
                calculateBoxFromLines(r); 
            }

            // 视觉反馈：按钮成功提示
            const btn = event.currentTarget;
            const originalText = btn.innerText;
            btn.innerText = "OK";
            setTimeout(() => { btn.innerText = originalText; }, 600);

            draw();
        }
        // --- [增强版] 支持多选的删除函数 ---
        window.deleteSelectedItems = function() {
            // 1. 如果没有多选，则尝试删除当前活动的单条
            if (selectedItems.length === 0) {
                if (activeRegionIndex !== -1) {
                    // 这里执行原本的单选删除逻辑
                    const r = regions[activeRegionIndex];
                    if (activeLineIndex !== -1) {
                        r.lines.splice(activeLineIndex, 1);
                        if (r.texts) r.texts.splice(activeLineIndex, 1);
                        if (r.lines.length === 0) regions.splice(activeRegionIndex, 1);
                        else initRegionBox(r);
                    } else {
                        regions.splice(activeRegionIndex, 1);
                    }
                }
            } else {
                // 2. 多选删除逻辑：按 Region 分组处理
                const groups = {};
                selectedItems.forEach(item => {
                    if (!groups[item.regionIdx]) groups[item.regionIdx] = [];
                    groups[item.regionIdx].push(item.lineIdx);
                });

                // 【关键】对 regionIdx 进行降序排列，从索引最大的开始删，防止前面的索引偏移
                const sortedRegionIndices = Object.keys(groups).map(Number).sort((a, b) => b - a);

                sortedRegionIndices.forEach(rIdx => {
                    const r = regions[rIdx];
                    // 对当前区域内的小框索引也进行降序排列
                    const linesToDelete = groups[rIdx].sort((a, b) => b - a);

                    linesToDelete.forEach(lIdx => {
                        if (lIdx !== -1 && r.lines[lIdx]) {
                            r.lines.splice(lIdx, 1);
                            if (r.texts) r.texts.splice(lIdx, 1);
                        }
                    });

                    // 如果该区域的所有行都被删光了，或者点中的是大框本身(lineIdx为-1)，则删除整个区域
                    if (linesToDelete.includes(-1) || r.lines.length === 0) {
                        regions.splice(rIdx, 1);
                    } else {
                        initRegionBox(r); // 重新计算剩下行框的包围盒
                    }
                });
            }

            // 3. 清理状态并重绘
            selectedItems = [];
            activeRegionIndex = -1;
            activeLineIndex = -1;
            isShiftMultiSelect = false; // 关闭多选高亮标记
            resetSidebar(); 
            draw();
        };

        /**
        * 判断颜色是否接近白色 (带容差)
        * @param {string} hex - 16进制颜色值 (如 #ffffff)
        * @param {number} threshold - 容差阈值 (0-255)，越高越接近纯白，建议 220
        */
        function isNearWhite(hex, threshold = 220) {
            if (!hex || !hex.startsWith('#')) return false;
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            // 如果红绿蓝三个分量都高于阈值，则认为是白色系
            return r > threshold && g > threshold && b > threshold;
        }

        // --- 新增变量 ---

        // --- 键盘快捷键 (上一条/下一条/保存) ---

        /**
        * 自动检测并列出系统字体
        */
        async function detectSystemFonts() {
            // 检查浏览器是否支持该 API (目前 Chrome, Edge 支持)
            if (!('queryLocalFonts' in window)) {
                alert("当前浏览器不支持自动检测系统字体，请尝试使用 Chrome 或 Edge。");
                return;
            }

            try {
                // 请求权限并获取字体列表
                const fonts = await window.queryLocalFonts();
                const fontSelect = document.getElementById('fontSelect');

                // 使用 Set 去重，因为一个字体家族通常包含很多变体 (Bold, Italic 等)
                const families = [...new Set(fonts.map(f => f.family))].sort();

                // 创建一个分组并添加到下拉框
                const group = document.createElement('optgroup');
                group.label = "--- 系统发现的字体 ---";

                families.forEach(family => {
                    const option = document.createElement('option');
                    // 格式化为 CSS 属性值
                    option.value = `"${family}", sans-serif`;
                    option.textContent = family;
                    group.appendChild(option);
                });

                fontSelect.appendChild(group);
                
                // 视觉反馈
                const btn = event.currentTarget;
                btn.innerText = "OK";
                btn.classList.replace('bg-blue-600', 'bg-green-600');
                console.log(`成功载入 ${families.length} 个系统字体`);

            } catch (err) {
                console.error("检测字体失败:", err);
                if (err.name === 'NotAllowedError') {
                    alert("用户拒绝了字体访问权限。");
                }
            }
        }

        // 3. 更新 setActiveRegion (关键：填充侧边栏)
        // 覆盖原本的 setActiveRegion 函数
        /**
        * 核心选中逻辑：同步所有 UI 控件状态到侧边栏
        * @param {number} i - 选中的区域索引
        */
        function setActiveRegion(i) {
            activeRegionIndex = i;
            const r = regions[i];
            if (!r) return;

            // --- A. 建立重置快照 (双框分开存储) ---
            r.transSnapshot = r.translation || "";      // 存储译文快照
            r.origSnapshot = [...(r.texts || [])];     // 存储原文快照 (深拷贝数组)

            // --- B. UI 状态切换 ---
            const container = document.getElementById('editorContainer');
            container.style.opacity = '1';
            container.style.pointerEvents = 'auto';
            sidebarStatus.innerHTML = `<span class="text-yellow-500">#${i + 1}</span> / ${regions.length}`;
            // [新增] 同步描边开关状态到顶部 UI
            // 如果该区域没设置过开关，则跟随全局默认值
            strokeEnableCb.checked = (r.strokeEnable !== undefined) ? r.strokeEnable : activeStrokeEnabled;
            // --- C. 填充内容 ---
            // 译文框：处理换行符
            document.getElementById('transEditArea').value = (r.translation || "").replace(/【BR】/g, '\n');
            // 原文框：数组转多行
            document.getElementById('origEditArea').value = (r.texts || []).join('\n');


            // --- 核心修复：选中单框时同步字体显示 ---
            const currentFont = r.fontFamily || activeFontFamily; // 优先取单框字体，否则取全局
            
            // 1. 尝试直接匹配下拉菜单的值
            fontSelect.value = currentFont;

            // 2. 如果下拉菜单中没有这个选项（说明是自定义输入的或手动加载的字体）
            if (fontSelect.value !== currentFont && currentFont) {
                fontSelect.value = 'custom';
                customFontInput.classList.remove('hidden');
                // 还原显示名称，去掉引号和 fallback 
                customFontInput.value = currentFont.replace(/"/g, '').replace(/, sans-serif/g, '');
            } else {
                // 如果匹配成功或是标准字体，隐藏自定义输入框
                customFontInput.classList.add('hidden');
            }

            // --- D. 同步其他属性 (字号、字体等) ---
            fontSizeInput.disabled = false;
            fontSizeInput.value = (r.font_size || 20).toFixed(1);
            lineSpacingInput.disabled = false;
            lineSpacingInput.value = (r.line_spacing || 1.2).toFixed(2);
            letterSpacingInput.disabled = false;
            letterSpacingInput.value = (r.letter_spacing || 0).toFixed(2);
            textAlignSelect.value = r.textAlign || activeTextAlign;
            fontWeightSelect.value = r.fontWeight || activeFontWeight;

            // 在 setActiveRegion(i) 函数末尾添加：
            document.getElementById('blurEnable').checked = !!r.blurEnable;
            // 将原来的数值作为倍率显示，比如 0.1 表示 10% 的字号
            document.getElementById('blurSizeInput').value = r.blurSizeRatio || 0.1;

            document.getElementById('btnBlurColor').style.backgroundColor = r.blurColor || "#000000";

            updateColorSwatches();
            draw();
        }

        // 4. 重置侧边栏 (点击空白处时)
        // 修改原本的 onMouseDown 里的 else 分支
        function resetSidebar() {
            activeRegionIndex = -1;
            const container = document.getElementById('editorContainer');
            
            // --- 核心修改：不要使用 none，改用 auto 确保临时文本框可用 ---
            container.style.opacity = '0.5';          // 变淡提示未选中
            container.style.pointerEvents = 'auto';   // 必须是 auto，否则点不动编辑框
            sidebarStatus.innerText = "未选择区域";

            sidebarStatus.innerHTML = `<span class="text-blue-400">全局样式模式</span>`;
            // 只清空属于区域的编辑框，不要禁用整个容器
            transEditArea.value = '';
            origEditArea.value = '';

            // --- 核心修复：还原字体下拉菜单显示 ---
            // 将下拉框的值设回全局默认字体
            if (activeFontFamily) {
                fontSelect.value = activeFontFamily;
            }

            // 顺便处理自定义字体输入框的显示/隐藏
            if (activeFontFamily !== 'custom') {
                customFontInput.classList.add('hidden');
            }
            
            // --- 新增：重置“属”按钮状态 ---
            const propBtn = document.getElementById('editPropBtnRight');
            propBtn.innerText = "属"; 
            propBtn.classList.remove('text-blue-400', 'border-blue-500/50');



            // 填入当前的全局基准值
            lineSpacingInput.value = activeLineSpacing.toFixed(2);
            letterSpacingInput.value = activeLetterSpacing.toFixed(2);

            // 调用你刚才改好的那个函数
            disableControls(); 
            updateColorSwatches();
        }

        // 修改 onMouseDown 的这部分逻辑
        /* 在原 onMouseDown 函数中：
           if (idx !== -1) setActiveRegion(idx);
           else { 
               // 替换原来的 disableControls(); renderSidebar(); 等代码
               resetSidebar();
               draw(); 
           }
        */

        // 5. 别忘了把之前的还原函数加上
        function restoreLinesFromCenter(region) {
            if (!region.lines || region.lines.length === 0 || typeof region.angle !== 'number' || region.angle === 0) return;
            let totalX = 0, totalY = 0, count = 0;
            region.lines.forEach(line => { line.forEach(pt => { totalX += pt[0]; totalY += pt[1]; count++; }); });
            if (count === 0) return;
            const cx = totalX / count; const cy = totalY / count;
            const rad = region.angle * Math.PI / 180; const cos = Math.cos(rad); const sin = Math.sin(rad);
            const newLines = region.lines.map(line => {
                return line.map(pt => {
                    const dx = pt[0] - cx; const dy = pt[1] - cy;
                    return [ dx * cos - dy * sin + cx, dx * sin + dy * cos + cy ];
                });
            });
            region.lines = newLines;
        }

        /**
         * 导出当前页面的 JSON 数据
         * 包含所有排版、颜色、坐标属性
         */
        function exportCurrentJson() {
            if (!regions || regions.length === 0) return alert("当前没有可导出的数据");

            // 1. 导出前，先同步一下当前页面的最新状态到内存 (防止最后一次挪动没存上)
            if (matchedFiles[currentFileIndex]) {
                matchedFiles[currentFileIndex].regions = JSON.parse(JSON.stringify(regions));
            }

            // 2. 构建导出结构
            // 这里导出的 regions 数组会包含你在编辑器里改过的每一个属性 (angle, box, blur, stroke 等)
            const exportData = {
                regions: JSON.parse(JSON.stringify(regions)) 
            };

            // 3. 转换为 JSON 字符串并触发下载
            const jsonStr = JSON.stringify(exportData, null, 2);
            const blob = new Blob([jsonStr], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.href = url;
            link.download = `${currentFileName || "mtu_data"}.json`;
            link.click();
            URL.revokeObjectURL(url);
        }

        /**
         * 批量导出全书所有页面的 JSON 并打包为 ZIP
         */
        async function exportAllJsons() {
            if (matchedFiles.length === 0) {
                alert("请先进入文件夹模式并加载数据");
                return;
            }

            // 确保当前页的操作已同步到内存
            if (matchedFiles[currentFileIndex]) {
                matchedFiles[currentFileIndex].regions = JSON.parse(JSON.stringify(regions));
            }

            const zip = new JSZip();
            
            // 遍历内存中的所有文件数据
            matchedFiles.forEach(item => {
                const fileContent = {
                    regions: item.regions
                };
                const fileName = item.jsonName || (item.image.name.split('.')[0] + ".json");
                zip.file(fileName, JSON.stringify(fileContent, null, 2));
            });

            try {
                const content = await zip.generateAsync({ type: "blob" });
                const url = URL.createObjectURL(content);
                const link = document.createElement("a");
                link.href = url;
                link.download = `MTU_JSON_Project_${Date.now()}.zip`;
                link.click();
                URL.revokeObjectURL(url);
            } catch (err) {
                console.error("打包失败:", err);
                alert("ZIP 打包失败");
            }
        }


        // --- 绑定事件 (在底部 JS 区域) ---
        btnResetSidebar.addEventListener('click', resetTextareaContent);

        // --- 新增重置函数 ---
        function resetTextareaContent() {
            if (activeRegionIndex !== -1 && regions[activeRegionIndex]) {
                const r = regions[activeRegionIndex];
                
                // --- 1. 还原译文逻辑 ---
                const transSnapshot = r.transSnapshot || "";
                document.getElementById('transEditArea').value = transSnapshot.replace(/【BR】/g, '\n');
                r.translation = transSnapshot;
                
                // --- 2. 还原原文逻辑 ---
                const origSnapshot = r.origSnapshot || [];
                document.getElementById('origEditArea').value = origSnapshot.join('\n');
                r.texts = [...origSnapshot];

                // --- 3. 视觉反馈与重绘 ---
                draw();
                
                // 两个框的边框变红闪烁一下，提示已重置
                const tArea = document.getElementById('transEditArea');
                const oArea = document.getElementById('origEditArea');
                tArea.style.borderColor = '#ef4444';
                oArea.style.borderColor = '#ef4444';
                setTimeout(() => {
                    tArea.style.borderColor = '#4b5563';
                    oArea.style.borderColor = '#4b5563';
                }, 500);
            }
        }

        // 暂存选中的颜色
        let pickedColor = "#000000";

        // 1. 选完颜色后，显示确认按钮
        window.stageColorForReplacement = function(color) {
            pickedColor = color;
            const btn = document.getElementById('colorReplaceBtn');
            btn.classList.remove('hidden');
            btn.innerText = `替换为 ${color}`;
            btn.style.backgroundColor = color;
        };

        // 2. 点击确认按钮，执行“精准替换”
        document.getElementById('colorReplaceBtn').onclick = function() {
            const textarea = document.getElementById('transEditArea');
            const start = textarea.selectionStart;
            const end = textarea.selectionEnd;
            const text = textarea.value;

            // 将当前编辑框中选中的内容（通常是 #000000）替换为新颜色
            textarea.value = text.substring(0, start) + pickedColor + text.substring(end);
            
            // 重新选中这个新颜色，方便你如果不满意继续改
            textarea.focus();
            textarea.setSelectionRange(start, start + pickedColor.length);
            
            // 隐藏自己并重绘画面
            this.classList.add('hidden');
            textarea.dispatchEvent(new Event('input'));
        };

        // 点击预览块打开取色器
        document.getElementById('btnBlurColor').addEventListener('click', () => {
            colorPickTargetIndex = activeRegionIndex;
            let currentColor = (colorPickTargetIndex !== -1 && regions[colorPickTargetIndex]) ? 
                (regions[colorPickTargetIndex].blurColor || "#000000") : "#000000";
            nativeBlurPicker.value = colorToHex(currentColor);
            nativeBlurPicker.click();
        });


        // 补充：发光开关和大小的即时监听
        // --- 修改后的发光控制监听 ---
        document.getElementById('blurEnable').addEventListener('change', (e) => {
            if (activeRegionIndex !== -1 && regions[activeRegionIndex]) {
                regions[activeRegionIndex].blurEnable = e.target.checked;
                draw();
            }
        });

        // 脚本末尾的监听器
        document.getElementById('blurSizeInput').addEventListener('input', (e) => {
            if (activeRegionIndex !== -1 && regions[activeRegionIndex]) {
                // 存储为比例
                regions[activeRegionIndex].blurSizeRatio = parseFloat(e.target.value) || 0;
                draw();
            }
        });

        // 译文即时重绘：处理换行标签
        // 修改监听器 ---
        document.getElementById('transEditArea').addEventListener('input', (e) => {
            if (activeRegionIndex !== -1 && regions[activeRegionIndex]) {
                // 在存入数据前，将换行符替换为 【BR】，同时允许用户手动输入的 ↵ 符号存在
                regions[activeRegionIndex].translation = e.target.value.replace(/\n/g, '【BR】');
                draw();
            }
        });


        // 原文即时重绘：处理数组拆分
        document.getElementById('origEditArea').addEventListener('input', (e) => {
            if (activeRegionIndex !== -1 && regions[activeRegionIndex]) {
                regions[activeRegionIndex].texts = e.target.value.split('\n');
                draw();
            }
        });

        resetSidebar();
    </script>
</body>
